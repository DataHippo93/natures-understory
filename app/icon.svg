<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Deep forest background gradient -->
    <radialGradient id="bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#1e2d14"/>
      <stop offset="100%" stop-color="#0b1508"/>
    </radialGradient>
    <!-- Fern leaf gradient: light tip to dark base -->
    <linearGradient id="fern" x1="16" y1="5" x2="16" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b8d98a"/>
      <stop offset="55%" stop-color="#6b9e45"/>
      <stop offset="100%" stop-color="#3a6020"/>
    </linearGradient>
    <!-- Subtle inner glow on fronds -->
    <linearGradient id="frondL" x1="16" y1="0" x2="6" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8e89a"/>
      <stop offset="100%" stop-color="#4f7d30"/>
    </linearGradient>
    <linearGradient id="frondR" x1="16" y1="0" x2="26" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8e89a"/>
      <stop offset="100%" stop-color="#4f7d30"/>
    </linearGradient>
    <!-- Soil glow -->
    <radialGradient id="soil" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a83a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5e1a" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle vignette ring -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#000" stroke-width="2" opacity="0.4"/>

  <!-- Ground soil glow -->
  <ellipse cx="16" cy="28.5" rx="5.5" ry="1.5" fill="url(#soil)"/>

  <!-- Central stem -->
  <path d="M16 28 C16.1 24 15.6 18 16 6" stroke="url(#fern)" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Left fronds (large → small toward tip) -->
  <path d="M15.7 23.5 C12.8 22.8 9.5 21 8 18.5" stroke="url(#frondL)" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M15.7 20.5 C12.5 19.2 9.5 17 8.5 14.5" stroke="url(#frondL)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M15.7 17.5 C13 15.8 10.5 13.5 10 11" stroke="url(#frondL)" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M15.7 14.5 C13.5 13 12 11 12.5 8.5" stroke="url(#frondL)" stroke-width="0.95" stroke-linecap="round"/>
  <path d="M15.8 11.5 C14.5 10.2 14 8.5 14.5 7" stroke="url(#frondL)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Right fronds -->
  <path d="M16.3 23.5 C19.2 22.8 22.5 21 24 18.5" stroke="url(#frondR)" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M16.3 20.5 C19.5 19.2 22.5 17 23.5 14.5" stroke="url(#frondR)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M16.3 17.5 C19 15.8 21.5 13.5 22 11" stroke="url(#frondR)" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M16.3 14.5 C18.5 13 20 11 19.5 8.5" stroke="url(#frondR)" stroke-width="0.95" stroke-linecap="round"/>
  <path d="M16.2 11.5 C17.5 10.2 18 8.5 17.5 7" stroke="url(#frondR)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Tip bud -->
  <circle cx="16" cy="5.8" r="1.1" fill="#c8e89a" opacity="0.85"/>
</svg>
