services:
  storehouse:
    build: .
    ports:
      - "8765:8765"
    env_file: .env
    volumes:
      # Persist cache across container restarts so data survives redeploys
      - storehouse_cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  storehouse_cache:
